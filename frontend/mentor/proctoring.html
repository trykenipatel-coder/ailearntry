<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proctoring Dashboard — AILearn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .proctor-header { margin-bottom:28px; }
        .proctor-header h1 { font-size:24px; font-weight:800; margin-bottom:4px; }
        .proctor-header p { font-size:13px; color:var(--text-secondary); }
        .stat-cards { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:14px; margin-bottom:28px; }
        .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px; text-align:center; }
        .stat-card .s-val { font-size:28px; font-weight:800; }
        .stat-card .s-lbl { font-size:11px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.3px; font-weight:600; margin-top:4px; }
        .stat-card.danger .s-val { color:#dc2626; }
        .stat-card.warning .s-val { color:#ca8a04; }
        .stat-card.success .s-val { color:#16a34a; }
        .stat-card.brand .s-val { color:var(--brand-500); }
        .section-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; margin-bottom:20px; overflow:hidden; }
        .section-head { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
        .section-head h2 { font-size:15px; font-weight:700; }
        .filter-row { display:flex; gap:6px; }
        .filter-btn { padding:5px 12px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text-secondary); font-size:11px; font-weight:500; cursor:pointer; font-family:inherit; }
        .filter-btn.active { background:var(--brand-50); color:var(--brand-600); border-color:var(--brand-200); }
        .session-table { width:100%; border-collapse:collapse; }
        .session-table th { padding:10px 16px; text-align:left; font-size:11px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.3px; border-bottom:1px solid var(--border); background:var(--bg-secondary); }
        .session-table td { padding:12px 16px; font-size:13px; border-bottom:1px solid var(--border); }
        .session-table tr:hover { background:var(--bg-secondary); }
        .session-table tr:last-child td { border-bottom:none; }
        .risk-badge { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
        .risk-low { background:rgba(34,197,94,.1); color:#16a34a; }
        .risk-medium { background:rgba(234,179,8,.1); color:#ca8a04; }
        .risk-high { background:rgba(239,68,68,.1); color:#dc2626; }
        .status-badge { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
        .status-active { background:rgba(34,197,94,.1); color:#16a34a; }
        .status-ended { background:var(--bg-tertiary); color:var(--text-secondary); }
        .view-btn { padding:6px 14px; border-radius:6px; border:1px solid var(--brand-200); background:var(--brand-50); color:var(--brand-600); font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; }
        .view-btn:hover { background:var(--brand-100); }
        .event-type-badge { padding:2px 8px; border-radius:4px; font-size:10px; font-weight:600; background:var(--bg-tertiary); color:var(--text-secondary); }
        .empty-msg { padding:40px; text-align:center; color:var(--text-tertiary); font-size:13px; }
    </style>
</head>
<body class="bg-primary">
    <nav class="navbar" id="mainNav"><a href="../index.html" class="logo">AI<span>Learn</span></a><ul class="nav-links" id="navLinks"></ul></nav>

    <main style="max-width:1400px;margin:0 auto;padding:32px 48px;">
        <div class="proctor-header">
            <h1>Proctoring Dashboard</h1>
            <p>Monitor exam sessions, review suspicious activity, and manage proctoring reports.</p>
        </div>

        <div class="stat-cards" id="statsCards">
            <div class="stat-card brand"><div class="s-val" id="statTotal">0</div><div class="s-lbl">Total Sessions</div></div>
            <div class="stat-card warning"><div class="s-val" id="statFlagged">0</div><div class="s-lbl">Flagged Sessions</div></div>
            <div class="stat-card danger"><div class="s-val" id="statHigh">0</div><div class="s-lbl">High Risk</div></div>
        </div>

        <div class="section-card">
            <div class="section-head">
                <h2>All Proctoring Sessions</h2>
                <div class="filter-row">
                    <button class="filter-btn active" onclick="filterSessions(this,'')">All</button>
                    <button class="filter-btn" onclick="filterSessions(this,'flagged')">Flagged</button>
                    <button class="filter-btn" onclick="filterSessions(this,'high')">High Risk</button>
                </div>
            </div>
            <div id="sessionsList">
                <div class="empty-msg">Loading sessions...</div>
            </div>
        </div>
    </main>

    <script src="../js/auth.js"></script>
    <script>
    let allSessions = [];
    let currentFilter = "";

    document.addEventListener("DOMContentLoaded", function() {
        if (typeof checkAuth === "function") checkAuth();
        loadSessions();
        loadAnalytics();
    });

    async function loadAnalytics() {
        try {
            const r = await fetch("/api/proctoring/analytics", {credentials:"include"});
            const j = await r.json();
            if (j.success) {
                document.getElementById("statTotal").textContent = j.data.total_sessions;
                document.getElementById("statFlagged").textContent = j.data.flagged_sessions;
                document.getElementById("statHigh").textContent = j.data.high_risk;
            }
        } catch(e) {}
    }

    async function loadSessions() {
        try {
            const r = await fetch("/api/proctoring/all-sessions", {credentials:"include"});
            const j = await r.json();
            if (j.success) {
                allSessions = j.data;
                renderSessions();
            }
        } catch(e) {
            document.getElementById("sessionsList").innerHTML = '<div class="empty-msg">Error loading sessions</div>';
        }
    }

    function filterSessions(btn, filter) {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = filter;
        renderSessions();
    }

    function renderSessions() {
        let filtered = allSessions;
        if (currentFilter === "flagged") filtered = allSessions.filter(s => s.total_events > 0);
        else if (currentFilter === "high") filtered = allSessions.filter(s => s.risk_level === "high");

        const el = document.getElementById("sessionsList");
        if (!filtered.length) {
            el.innerHTML = '<div class="empty-msg">No sessions found</div>';
            return;
        }

        el.innerHTML = '<table class="session-table"><thead><tr><th>Student</th><th>Quiz</th><th>Status</th><th>Events</th><th>Risk</th><th>Started</th><th>Action</th></tr></thead><tbody>' +
            filtered.map(s => `<tr>
                <td><strong>${s.student_name || 'Unknown'}</strong></td>
                <td>${s.quiz_title || '—'}</td>
                <td><span class="status-badge ${s.status === 'active' ? 'status-active' : 'status-ended'}">${s.status}</span></td>
                <td>${s.total_events}</td>
                <td><span class="risk-badge risk-${s.risk_level}">${s.risk_level.toUpperCase()}</span></td>
                <td style="font-size:12px;color:var(--text-secondary)">${s.started_at || ''}</td>
                <td><button class="view-btn" onclick="viewSession(${s.session_id})">Review</button></td>
            </tr>`).join("") +
            '</tbody></table>';
    }

    function viewSession(sid) {
        window.location.href = `proctoring-review.html?session_id=${sid}`;
    }
    </script>
</body>
</html>

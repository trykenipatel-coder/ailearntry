<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Codes - AI Learning System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .ac-status { display:inline-flex;align-items:center;gap:6px;font-size:0.7rem;font-weight:600;padding:3px 10px;border-radius:999px }
        .ac-status.active { background:#dcfce7;color:#166534 }
        .ac-status.used { background:#fef3c7;color:#92400e }
        .ac-status.expired { background:#fce4ec;color:#c62828 }
        .ac-status.disabled { background:#f3f4f6;color:#6b7280 }
        .ac-code { font-family:'SF Mono',monospace;font-size:1.1rem;font-weight:700;letter-spacing:.15em;color:#007aff;background:var(--neutral-50);padding:6px 14px;border-radius:8px;display:inline-block;border:1px solid var(--border-subtle) }
        .ac-copy-btn { cursor:pointer;padding:8px 18px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);font-size:0.8125rem;font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:6px;color:var(--neutral-700);font-family:var(--font) }
        .ac-copy-btn:hover { background:var(--brand-50);border-color:var(--brand-300);color:var(--brand-700);box-shadow:var(--shadow-xs) }
        .ac-copy-btn svg { width:16px;height:16px;flex-shrink:0 }
        .ac-card { border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:20px;background:var(--surface);transition:all .3s }
        .ac-card:hover { box-shadow:0 4px 24px rgba(0,0,0,0.04) }
        .ac-card-header { display:flex;justify-content:space-between;align-items:start;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border-subtle);flex-wrap:wrap;gap:12px }
        .ac-card-header .qi { font-size:0.7rem;color:var(--neutral-400);margin-top:4px }
        .ac-two-codes { display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:16px }
        @media(max-width:768px){ .ac-two-codes { grid-template-columns:1fr } }
        .ac-code-box { padding:16px;border-radius:var(--radius);border:1px solid var(--border-subtle);background:var(--neutral-50) }
        .ac-code-box .lbl { font-size:0.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--neutral-400);margin-bottom:8px;font-weight:600 }
        .ac-code-box .code-row { display:flex;align-items:center;gap:10px;flex-wrap:wrap }
        .ac-code-box .info-row { font-size:0.7rem;color:var(--neutral-400);margin-top:8px;display:flex;gap:16px;flex-wrap:wrap }
        .ac-actions { display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--border-subtle) }
        .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px) }
        .modal-box { background:var(--surface);border-radius:var(--radius-lg);padding:32px;max-width:520px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-2xl);animation:slideUp 0.25s var(--ease) }
        .modal-box h2 { font-size:1.1rem;margin-bottom:20px }
        .modal-close { float:right;border:none;background:transparent;cursor:pointer;font-size:1.25rem;color:var(--neutral-400) }
        @keyframes slideUp { from { opacity:0;transform:translateY(20px) } to { opacity:1;transform:translateY(0) } }
        /* Published success banner */
        .pub-banner { background:linear-gradient(135deg,#059669,#007aff);color:#fff;border-radius:var(--radius-lg);padding:32px;margin-bottom:24px;text-align:center;position:relative;overflow:hidden }
        .pub-banner::before { content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cpattern id='g' patternUnits='userSpaceOnUse' width='60' height='60'%3E%3Ccircle cx='30' cy='30' r='1.5' fill='rgba(255,255,255,0.15)'/%3E%3C/pattern%3E%3C/defs%3E%3Crect width='60' height='60' fill='url(%23g)'/%3E%3C/svg%3E");opacity:0.3 }
        .pub-banner h2 { color:#fff !important;font-size:1.5rem;position:relative;z-index:1 }
        .pub-banner p { color:rgba(255,255,255,0.85);position:relative;z-index:1;margin-bottom:20px }
        .pub-codes { display:flex;gap:24px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1 }
        .pub-code-item { background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);border-radius:12px;padding:20px 28px;min-width:200px;border:1px solid rgba(255,255,255,0.2) }
        .pub-code-item .lbl { font-size:0.65rem;text-transform:uppercase;letter-spacing:.08em;opacity:0.8;margin-bottom:8px;font-weight:600 }
        .pub-code-item .val { font-family:'SF Mono',monospace;font-size:1.5rem;font-weight:800;letter-spacing:.15em;margin-bottom:8px }
        .pub-code-item .btn { background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.3);font-size:0.8125rem;font-weight:500;padding:8px 20px;border-radius:var(--radius);display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:all .2s;font-family:var(--font) }
        .pub-code-item .btn:hover { background:rgba(255,255,255,0.3);box-shadow:0 2px 8px rgba(0,0,0,0.15) }
        .pub-code-item .btn svg { width:16px;height:16px }
        .pub-close-btn { position:absolute;top:12px;right:16px;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:1.2rem;cursor:pointer;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;z-index:2 }
        .pub-close-btn:hover { background:rgba(255,255,255,0.25) }
        body.dark .ac-code { background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08);color:#4da6ff }
        body.dark .ac-code-box { background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.06) }
        body.dark .ac-copy-btn { background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08);color:var(--neutral-300) }
        body.dark .ac-copy-btn:hover { background:rgba(99,102,241,.12);border-color:var(--brand-400);color:var(--brand-300) }
        body.dark .ac-card { background:#1c1c1e;border-color:rgba(255,255,255,.06) }
        body.dark .ac-card:hover { box-shadow:0 4px 24px rgba(0,0,0,0.2) }
        body.dark .ac-status.active { background:rgba(34,197,94,0.15);color:#86efac }
        body.dark .ac-status.used { background:rgba(245,158,11,0.15);color:#fbbf24 }
        body.dark .ac-status.expired { background:rgba(239,68,68,0.15);color:#fca5a5 }
        body.dark .ac-status.disabled { background:rgba(107,114,128,0.15);color:#9ca3af }
    </style>
</head>
<body>
    <nav class="navbar" id="mainNav">
        <a href="../index.html" class="logo">AI<span>Learn</span></a>
        <ul class="nav-links" id="navLinks">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="quizzes.html">Quizzes</a></li>
            <li><a href="create-quiz.html">Create Quiz</a></li>
            <li><a href="ai-quiz.html">AI Quiz</a></li>
            <li><a href="access-codes.html" style="color:var(--brand-600);font-weight:600">Codes</a></li>
            <li><a href="materials.html">Materials</a></li>
            <li><a href="leaderboard.html">Leaderboard</a></li>
            <li><a href="analytics.html">Analytics</a></li>
        
        </ul>
    </nav>

    <main class="container dashboard">
        <div class="dashboard-header">
            <h1>Access Code Management</h1>
            <p>Manage access codes, set validity windows, and control quiz attempts.</p>
        </div>

        <div id="pub-banner" style="display:none"></div>
        <div id="access-codes-container">
            <div class="loading"><div class="spinner"></div>Loading access codes...</div>
        </div>
    </main>

    <!-- Edit Code Settings Modal -->
    <div id="edit-code-modal" class="modal-overlay" style="display:none">
        <div class="modal-box">
            <button class="modal-close" onclick="closeEditCodeModal()">&times;</button>
            <h2>Edit Access Code Settings</h2>
            <input type="hidden" id="edit-code-id">
            <input type="hidden" id="edit-quiz-id">
            <div class="grid-2" style="margin-bottom:12px">
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" id="edit-start-date" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:0.8125rem">
                </div>
                <div class="form-group">
                    <label>Start Time</label>
                    <input type="time" id="edit-start-time" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:0.8125rem">
                </div>
            </div>
            <div class="grid-2" style="margin-bottom:16px">
                <div class="form-group">
                    <label>Expiry Date</label>
                    <input type="date" id="edit-expiry-date" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:0.8125rem">
                </div>
                <div class="form-group">
                    <label>Expiry Time</label>
                    <input type="time" id="edit-expiry-time" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:0.8125rem">
                </div>
            </div>
            <div id="edit-code-feedback" style="margin-bottom:12px"></div>
            <div style="display:flex;gap:12px;justify-content:flex-end">
                <button class="btn btn-secondary" onclick="closeEditCodeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveCodeSettings()">Save Settings</button>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/mentor.js"></script>
    <script>
        // ─── Published Banner ──────────────────────────────────────────
        var pubQuizId = sessionStorage.getItem('pub_quiz_id');
        var pubPrimary = sessionStorage.getItem('pub_primary');
        var pubBackup = sessionStorage.getItem('pub_backup');
        if (pubQuizId && pubPrimary && pubBackup) {
            var banner = document.getElementById('pub-banner');
            if (banner) {
                banner.style.display = 'block';
                banner.className = 'pub-banner';
                banner.innerHTML = '<button class="pub-close-btn" onclick="document.getElementById(\'pub-banner\').style.display=\'none\'">&times;</button>' +
                    '<h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px;vertical-align:middle;margin-right:8px"><polyline points="20 6 9 17 4 12"/></svg> Quiz Published Successfully!</h2>' +
                    '<p>Share these access codes with your students. Each code has a unique 8-character key.</p>' +
                    '<div class="pub-codes">' +
                        '<div class="pub-code-item">' +
                            '<div class="lbl"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#3b82f6;vertical-align:middle;margin-right:4px"></span> Primary Code</div>' +
                            '<div class="val">' + pubPrimary + '</div>' +
                            '<button class="btn" onclick="copyCode(\'' + pubPrimary + '\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;margin-right:4px"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy</button>' +
                        '</div>' +
                        '<div class="pub-code-item">' +
                            '<div class="lbl"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#f59e0b;vertical-align:middle;margin-right:4px"></span> Backup Code</div>' +
                            '<div class="val">' + pubBackup + '</div>' +
                            '<button class="btn" onclick="copyCode(\'' + pubBackup + '\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;margin-right:4px"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy</button>' +
                        '</div>' +
                    '</div>';
            }
            sessionStorage.removeItem('pub_quiz_id');
            sessionStorage.removeItem('pub_primary');
            sessionStorage.removeItem('pub_backup');
        }
        loadAccessCodes();
    </script>
</body>
</html>

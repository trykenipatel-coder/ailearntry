<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor Analytics — AILearn</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dash-container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        .dash-header { padding: 40px 0 24px; }
        .dash-header h1 { font-size: 1.8rem; font-weight: 700; margin: 0 0 4px; }
        .dash-header .sub { color: var(--text-secondary); font-size: 0.9rem; }

        .summary-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
        .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 16px; text-align: center; }
        .summary-card .icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; }
        .summary-card .num { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
        .summary-card .lbl { font-size: 0.78rem; color: var(--text-tertiary); margin-top: 2px; }

        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .card h2 { font-size: 1.05rem; font-weight: 600; margin: 0 0 14px; color: var(--text-primary); }

        .student-table { width: 100%; border-collapse: collapse; }
        .student-table th { text-align: left; font-size: 0.75rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px; border-bottom: 1px solid var(--border); }
        .student-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 0.88rem; color: var(--text-secondary); }
        .student-table tr:last-child td { border-bottom: none; }
        .student-table tr:hover td { background: var(--bg-secondary); }
        .student-table .acc { font-weight: 600; }

        .tag { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
        .tag-red { background: rgba(239,68,68,0.12); color: #ef4444; }
        .tag-green { background: rgba(34,197,94,0.12); color: #22c55e; }
        .tag-blue { background: rgba(59,130,246,0.12); color: #3b82f6; }
        .tag-yellow { background: rgba(234,179,8,0.12); color: #eab308; }

        .topic-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
        .topic-item:last-child { border-bottom: none; }
        .topic-item .topic-name { color: var(--text-secondary); }
        .topic-item .topic-avg { font-weight: 600; }

        .empty-msg { color: var(--text-tertiary); font-size: 0.9rem; text-align: center; padding: 24px 0; }

        @media (max-width: 768px) {
            .summary-row { grid-template-columns: repeat(2, 1fr); }
            .chart-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="bg-primary">
    <nav class="navbar"></nav>
    <div id="navLinks"></div>

    <div class="dash-container">
        <div class="dash-header">
            <h1>Mentor Analytics Dashboard</h1>
            <p class="sub">Monitor all student learning progress from one place</p>
        </div>

        <div class="summary-row" id="summaryRow"></div>

        <div class="chart-row">
            <div class="card">
                <h2>Class Performance Trend</h2>
                <canvas id="perfChart" height="200"></canvas>
            </div>
            <div class="card">
                <h2>Topic Difficulty Analysis</h2>
                <canvas id="topicChart" height="200"></canvas>
            </div>
        </div>

        <div class="card" style="margin-bottom:24px;">
            <h2>All Students</h2>
            <div style="overflow-x:auto;">
                <table class="student-table">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Code</th>
                            <th>Quizzes</th>
                            <th>Accuracy</th>
                            <th>Avg Time</th>
                            <th>Streak</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="studentTable"></tbody>
                </table>
            </div>
        </div>

        <div class="chart-row">
            <div class="card">
                <h2>Struggling Students</h2>
                <div id="strugglingList"></div>
            </div>
            <div class="card">
                <h2>Top Performers</h2>
                <div id="topList"></div>
            </div>
        </div>

        <div class="card" style="margin-bottom:24px;">
            <h2>Most Difficult Topics</h2>
            <div id="difficultTopicsList"></div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script>
    function tagForAcc(acc) {
        if (acc >= 80) return '<span class="tag tag-green">Excellent</span>';
        if (acc >= 60) return '<span class="tag tag-blue">Good</span>';
        if (acc >= 40) return '<span class="tag tag-yellow">Average</span>';
        return '<span class="tag tag-red">Needs Support</span>';
    }

    function renderSummary(d) {
        const items = [
            { icon: 'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z', num: d.total_students, lbl: 'Total Students', bg: 'var(--brand-100, #e0e7ff)', c: 'var(--brand-500)' },
            { icon: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z', num: d.avg_class_performance + '%', lbl: 'Avg Class Performance', bg: 'rgba(34,197,94,0.1)', c: 'var(--green-500)' },
            { icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01', num: d.total_quizzes_taken, lbl: 'Total Quizzes Taken', bg: 'rgba(234,179,8,0.1)', c: 'var(--yellow-500)' },
            { icon: 'M13 7h8m0 0v8m0-8l-8 8-4-4-6 6', num: d.quiz_completion_rate + '%', lbl: 'Quiz Completion Rate', bg: 'rgba(168,85,247,0.1)', c: 'var(--purple-500)' },
        ];
        document.getElementById('summaryRow').innerHTML = items.map(it => `
            <div class="summary-card">
                <div class="icon" style="background:${it.bg}"><svg viewBox="0 0 24 24" fill="none" stroke="${it.c}" stroke-width="2" width="20" height="20"><path d="${it.icon}"/></svg></div>
                <div class="num">${it.num}</div>
                <div class="lbl">${it.lbl}</div>
            </div>
        `).join('');
    }

    function renderTable(students) {
        document.getElementById('studentTable').innerHTML = students.map(s => `
            <tr>
                <td style="font-weight:600;color:var(--text-primary)">${s.name}</td>
                <td>${s.student_code}</td>
                <td>${s.total_quizzes}</td>
                <td class="acc" style="color:${s.avg_accuracy >= 70 ? 'var(--green-500)' : s.avg_accuracy >= 50 ? 'var(--blue-500)' : 'var(--red-500)'}">${s.avg_accuracy}%</td>
                <td>${s.avg_response_time}s</td>
                <td>${s.current_streak}</td>
                <td>${tagForAcc(s.avg_accuracy)}</td>
            </tr>
        `).join('');
    }

    function renderList(el, students, emptyMsg) {
        if (!students || !students.length) {
            document.getElementById(el).innerHTML = `<p class="empty-msg">${emptyMsg}</p>`;
            return;
        }
        document.getElementById(el).innerHTML = students.map(s => `
            <div class="topic-item">
                <span class="topic-name">${s.name} <span style="font-size:0.75rem;color:var(--text-tertiary)">(${s.student_code})</span></span>
                <span class="topic-avg" style="color:${s.avg_accuracy >= 70 ? 'var(--green-500)' : s.avg_accuracy >= 50 ? 'var(--yellow-500)' : 'var(--red-500)'}">${s.avg_accuracy}%</span>
            </div>
        `).join('');
    }

    function renderTopicList(el, topics) {
        if (!topics || !topics.length) {
            document.getElementById(el).innerHTML = '<p class="empty-msg">No topic data</p>';
            return;
        }
        document.getElementById(el).innerHTML = topics.map(t => `
            <div class="topic-item">
                <span class="topic-name">${t.topic}</span>
                <span class="topic-avg" style="color:${t.avg_mastery >= 70 ? 'var(--green-500)' : t.avg_mastery >= 50 ? 'var(--yellow-500)' : 'var(--red-500)'}">${t.avg_mastery}%</span>
            </div>
        `).join('');
    }

    function renderCharts(d) {
        if (!d.topic_analysis || !d.topic_analysis.length) return;

        const sorted = [...d.topic_analysis].sort((a, b) => b.student_count - a.student_count).slice(0, 8);
        new Chart(document.getElementById('topicChart'), {
            type: 'bar',
            data: {
                labels: sorted.map(t => t.topic.length > 18 ? t.topic.substring(0, 16) + '…' : t.topic),
                datasets: [{ label: 'Avg Mastery', data: sorted.map(t => t.avg_mastery), backgroundColor: sorted.map(t => t.avg_mastery >= 70 ? '#22c55e' : t.avg_mastery >= 50 ? '#3b82f6' : t.avg_mastery >= 30 ? '#eab308' : '#ef4444'), borderRadius: 6 }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { x: { beginAtZero: true, max: 100, grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { color: 'var(--text-tertiary)' } }, y: { grid: { display: false }, ticks: { color: 'var(--text-tertiary)' } } }
            }
        });

        const accBuckets = { Excellent: 0, Good: 0, Average: 0, 'Needs Support': 0 };
        (d.students || []).forEach(s => {
            if (s.avg_accuracy >= 80) accBuckets['Excellent']++;
            else if (s.avg_accuracy >= 60) accBuckets['Good']++;
            else if (s.avg_accuracy >= 40) accBuckets['Average']++;
            else accBuckets['Needs Support']++;
        });
        new Chart(document.getElementById('perfChart'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(accBuckets),
                datasets: [{ data: Object.values(accBuckets), backgroundColor: ['#22c55e', '#3b82f6', '#eab308', '#ef4444'], borderWidth: 0 }]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: 'var(--text-secondary)', padding: 12 } } } }
        });
    }

    async function loadDashboard() {
        try {
            const r = await fetch('/api/mentor/analytics-dashboard', { credentials: 'include' });
            const j = await r.json();
            if (!j.success) return;
            const d = j.data;

            renderSummary(d);
            renderTable(d.students || []);
            renderList('strugglingList', d.struggling_students, 'No struggling students');
            renderList('topList', d.top_students, 'No top performers yet');
            renderTopicList('difficultTopicsList', d.difficult_topics);
            renderCharts(d);
        } catch(e) { console.error('Dashboard load failed:', e); }
    }

    loadDashboard();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Passport — AILearn</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .passport-container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
        .passport-hero { text-align: center; padding: 48px 0 24px; }
        .passport-hero h1 { font-size: 2rem; font-weight: 700; margin: 0 0 6px; }
        .passport-hero .sub { color: var(--text-secondary); font-size: 0.95rem; }

        .passport-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; margin-bottom: 24px; text-align: center; }
        .passport-card .avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--brand-100, #e0e7ff); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
        .passport-card .avatar svg { width: 40px; height: 40px; color: var(--brand-500); }
        .passport-card .name { font-size: 1.4rem; font-weight: 700; color: var(--text-primary); }
        .passport-card .code { font-size: 0.85rem; color: var(--text-tertiary); margin-top: 2px; }
        .passport-card .course { font-size: 0.9rem; color: var(--text-secondary); margin-top: 4px; }

        .level-badge { display: inline-block; padding: 6px 18px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; margin-top: 12px; letter-spacing: 0.5px; }
        .level-Advanced { background: rgba(34,197,94,0.12); color: #22c55e; }
        .level-Intermediate { background: rgba(59,130,246,0.12); color: #3b82f6; }
        .level-Beginner { background: rgba(234,179,8,0.12); color: #eab308; }

        .passport-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; text-align: center; }
        .metric-card .num { font-size: 1.6rem; font-weight: 700; color: var(--text-primary); }
        .metric-card .lbl { font-size: 0.78rem; color: var(--text-tertiary); margin-top: 4px; }

        .health-ring { position: relative; width: 120px; height: 120px; margin: 0 auto 16px; }
        .health-ring svg { width: 120px; height: 120px; transform: rotate(-90deg); }
        .health-ring .track { fill: none; stroke: var(--bg-tertiary); stroke-width: 10; }
        .health-ring .fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
        .health-ring .label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .health-ring .label .num { font-size: 1.6rem; font-weight: 700; color: var(--text-primary); }
        .health-ring .label .lbl { font-size: 0.7rem; color: var(--text-tertiary); }

        .section-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .section-card h2 { font-size: 1.05rem; font-weight: 600; margin: 0 0 14px; color: var(--text-primary); }

        .topic-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .topic-chip { padding: 6px 12px; border-radius: 8px; font-size: 0.82rem; font-weight: 600; }
        .topic-chip.strong { background: rgba(34,197,94,0.1); color: #22c55e; }
        .topic-chip.weak { background: rgba(239,68,68,0.1); color: #ef4444; }

        .mastery-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .mastery-bar .topic { width: 140px; font-size: 0.82rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mastery-bar .bar-track { flex: 1; height: 7px; background: var(--bg-tertiary); border-radius: 4px; overflow: hidden; }
        .mastery-bar .bar-fill { height: 100%; border-radius: 4px; }
        .mastery-bar .pct { width: 40px; text-align: right; font-size: 0.8rem; font-weight: 600; }

        .rec-list { list-style: none; padding: 0; margin: 0; }
        .rec-list li { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; color: var(--text-secondary); display: flex; gap: 8px; }
        .rec-list li:last-child { border-bottom: none; }

        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

        @media (max-width: 768px) {
            .passport-metrics { grid-template-columns: repeat(2, 1fr); }
            .chart-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="bg-primary">
    <nav class="navbar"></nav>
    <div id="navLinks"></div>

    <div class="passport-container">
        <div class="passport-hero">
            <h1>Adaptive Learning Passport</h1>
            <p class="sub">Your complete digital learning profile</p>
        </div>

        <div class="passport-card" id="passportCard" style="display:none;">
            <div class="avatar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/></svg></div>
            <div class="name" id="pName"></div>
            <div class="code" id="pCode"></div>
            <div class="course" id="pCourse"></div>
            <div id="levelBadge"></div>
        </div>

        <div style="display:grid;grid-template-columns:180px 1fr;gap:24px;align-items:start;margin-bottom:24px;">
            <div class="section-card" style="text-align:center;">
                <h2 style="font-size:0.9rem;">Health Score</h2>
                <div class="health-ring" id="healthRing">
                    <svg viewBox="0 0 120 120">
                        <circle class="track" cx="60" cy="60" r="50"/>
                        <circle class="fill" id="healthFill" cx="60" cy="60" r="50" stroke="#22c55e" stroke-dasharray="314.16" stroke-dashoffset="314.16"/>
                    </svg>
                    <div class="label"><div class="num" id="healthNum">0</div><div class="lbl">Health</div></div>
                </div>
            </div>
            <div class="passport-metrics" id="metricsGrid" style="margin-bottom:0;"></div>
        </div>

        <div class="chart-row">
            <div class="section-card">
                <h2>Strong Topics</h2>
                <div class="topic-list" id="strongList"></div>
            </div>
            <div class="section-card">
                <h2>Weak Topics</h2>
                <div class="topic-list" id="weakList"></div>
            </div>
        </div>

        <div class="section-card">
            <h2>Topic Mastery Overview</h2>
            <div id="masteryBars"></div>
        </div>

        <div class="chart-row">
            <div class="section-card">
                <h2>Learning Progress Timeline</h2>
                <canvas id="timelineChart" height="200"></canvas>
            </div>
            <div class="section-card">
                <h2>Study Recommendations</h2>
                <ul class="rec-list" id="recList"></ul>
            </div>
        </div>

        <p style="text-align:center;color:var(--text-tertiary);font-size:0.82rem;padding:16px 0;">Last updated: <span id="lastUpdated">—</span></p>
    </div>

    <script src="../js/auth.js"></script>
    <script>
    function masteryColor(pct) {
        if (pct >= 80) return '#22c55e';
        if (pct >= 60) return '#3b82f6';
        if (pct >= 40) return '#eab308';
        return '#ef4444';
    }

    function healthColor(score) {
        if (score >= 75) return '#22c55e';
        if (score >= 50) return '#3b82f6';
        if (score >= 30) return '#eab308';
        return '#ef4444';
    }

    function renderHealth(score) {
        const circumference = 314.16;
        const offset = circumference - (circumference * score / 100);
        const fill = document.getElementById('healthFill');
        fill.style.strokeDashoffset = offset;
        fill.style.stroke = healthColor(score);
        document.getElementById('healthNum').textContent = score;
    }

    function renderMetrics(d) {
        const items = [
            { num: d.als_score + '%', lbl: 'ALS Score' },
            { num: d.quiz_accuracy + '%', lbl: 'Quiz Accuracy' },
            { num: d.avg_response_time + 's', lbl: 'Avg Response Time' },
            { num: d.total_quizzes, lbl: 'Quizzes Taken' },
            { num: d.total_achievements, lbl: 'Achievements' },
            { num: d.revision_streak, lbl: 'Revision Streak' },
            { num: d.revision_streak > 0 ? d.revision_streak + ' days' : '0 days', lbl: 'Longest Streak' },
            { num: Object.keys(d.topic_mastery || {}).length, lbl: 'Topics Covered' },
        ];
        document.getElementById('metricsGrid').innerHTML = items.map(it => `
            <div class="metric-card"><div class="num">${it.num}</div><div class="lbl">${it.lbl}</div></div>
        `).join('');
    }

    function renderTopics(mastery) {
        const entries = Object.entries(mastery || {}).sort((a, b) => b[1] - a[1]);

        if (!entries.length) {
            document.getElementById('strongList').innerHTML = '<p style="color:var(--text-tertiary);font-size:0.85rem;">No data yet</p>';
            document.getElementById('weakList').innerHTML = '<p style="color:var(--text-tertiary);font-size:0.85rem;">No data yet</p>';
            document.getElementById('masteryBars').innerHTML = '<p style="color:var(--text-tertiary);font-size:0.85rem;">No data yet</p>';
            return;
        }

        const strong = entries.filter(([, v]) => v >= 70);
        const weak = entries.filter(([, v]) => v < 50);

        document.getElementById('strongList').innerHTML = strong.length
            ? strong.map(([k, v]) => `<span class="topic-chip strong">${k} — ${v}%</span>`).join('')
            : '<p style="color:var(--text-tertiary);font-size:0.85rem;">None yet</p>';

        document.getElementById('weakList').innerHTML = weak.length
            ? weak.map(([k, v]) => `<span class="topic-chip weak">${k} — ${v}%</span>`).join('')
            : '<p style="color:var(--text-tertiary);font-size:0.85rem;">None — great job!</p>';

        document.getElementById('masteryBars').innerHTML = entries.map(([topic, pct]) => `
            <div class="mastery-bar">
                <div class="topic">${topic}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${masteryColor(pct)}"></div></div>
                <div class="pct" style="color:${masteryColor(pct)}">${pct}%</div>
            </div>
        `).join('');
    }

    function renderTimeline(timeline) {
        if (!timeline || !timeline.length) return;
        new Chart(document.getElementById('timelineChart'), {
            type: 'line',
            data: {
                labels: timeline.map(t => t.date),
                datasets: [{
                    label: 'Score %',
                    data: timeline.map(t => t.accuracy),
                    borderColor: '#6366f1',
                    backgroundColor: 'rgba(99,102,241,0.08)',
                    fill: true, tension: 0.4, pointRadius: 4, pointBackgroundColor: '#6366f1'
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, max: 100, grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { color: 'var(--text-tertiary)' } },
                    x: { grid: { display: false }, ticks: { color: 'var(--text-tertiary)', maxRotation: 45 } }
                }
            }
        });
    }

    async function loadPassport() {
        try {
            const r = await fetch('/api/student/passport', { credentials: 'include' });
            const j = await r.json();
            if (!j.success) return;
            const d = j.data;

            document.getElementById('passportCard').style.display = 'block';
            document.getElementById('pName').textContent = d.student_name;
            document.getElementById('pCode').textContent = d.student_code;
            document.getElementById('pCourse').textContent = d.course || 'General';
            document.getElementById('levelBadge').innerHTML = `<span class="level-badge level-${d.learning_level}">${d.learning_level}</span>`;

            renderHealth(d.health_score);
            renderMetrics(d);
            renderTopics(d.topic_mastery);
            renderTimeline(d.progress_timeline);

            document.getElementById('recList').innerHTML = (d.recommendations || []).map(r =>
                `<li><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--brand-500)" stroke-width="2"><path d="M9 5l7 7-7 7"/></svg>${r}</li>`
            ).join('');

            document.getElementById('lastUpdated').textContent = d.last_updated;
        } catch(e) { console.error('Passport load failed:', e); }
    }

    loadPassport();
    </script>
</body>
</html>

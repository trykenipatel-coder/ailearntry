<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Quizzes - Admin - AI Learning System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .qz-table { width:100%; border-collapse:collapse }
        .qz-table th { background:var(--neutral-50); padding:10px 12px; font-size:0.7rem; text-transform:uppercase; letter-spacing:.05em; color:var(--neutral-400); text-align:left; font-weight:600 }
        .qz-table td { padding:10px 12px; font-size:0.82rem; border-bottom:1px solid var(--border-subtle) }
        .qz-table tr:hover td { background:var(--neutral-50) }
        body.dark .qz-table th { background:rgba(255,255,255,.03) }
        body.dark .qz-table tr:hover td { background:rgba(255,255,255,.02) }
    </style>
</head>
<body>
    <nav class="navbar" id="mainNav">
        <a href="../index.html" class="logo">AI<span>Learn</span></a>
        <ul class="nav-links" id="navLinks">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="manage-students.html">Students</a></li>
            <li><a href="manage-mentors.html">Mentors</a></li>
            <li><a href="materials.html">Materials</a></li>
            <li><a href="quizzes.html" style="color:var(--brand-600);font-weight:600">Quizzes</a></li>
        </ul>
    </nav>

    <main class="container dashboard">
        <div class="dashboard-header">
            <h1>All Quizzes</h1>
            <p>View all quizzes created by mentors. Admins can delete any quiz.</p>
        </div>

        <div id="quizzes-container"><div class="loading"><div class="spinner"></div></div></div>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/admin.js"></script>
    <script>
        var allQuizzes = [];

        async function loadQuizzes() {
            var auth = await checkAuth();
            if (!auth || auth.role !== 'admin') return;
            var r = await apiRequest('/api/admin/quizzes');
            if (!r.success) return;
            allQuizzes = r.data || [];
            renderQuizzes(allQuizzes);
        }

        function renderQuizzes(list) {
            var c = document.getElementById('quizzes-container');
            if (!list.length) {
                c.innerHTML = '<div class="card" style="text-align:center;padding:60px 40px"><div style="font-size:3rem;margin-bottom:12px">📝</div><h2>No Quizzes</h2><p style="color:var(--text-light);font-size:0.9rem">No quizzes have been created yet.</p></div>';
                return;
            }
            var h = '<div class="table-container"><table class="qz-table"><thead><tr><th>Topic</th><th>Mentor</th><th>Subject</th><th>Difficulty</th><th>Status</th><th>Questions</th><th>Created</th><th>Action</th></tr></thead><tbody>';
            list.forEach(function(q) {
                var statusClass = q.status === 'published' ? 'success' : q.status === 'draft' ? 'warning' : 'secondary';
                var actions = '<button class="btn btn-danger btn-sm" onclick="deleteQuiz(' + q.quiz_id + ')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;vertical-align:middle;margin-right:4px"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>Delete</button>';
                if (q.status === 'published') {
                    actions = '<button class="btn btn-primary btn-sm" onclick="generateAdminQuizReport(' + q.quiz_id + ')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;vertical-align:middle;margin-right:4px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>Report</button> ';
                    actions += '<button class="btn btn-danger btn-sm" onclick="deleteQuiz(' + q.quiz_id + ')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;vertical-align:middle;margin-right:4px"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>Delete</button>';
                }
                h += '<tr><td><strong>' + q.topic + '</strong></td><td>' + q.mentor_name + '</td><td>' + (q.subject||'-') + '</td><td><span class="badge badge-primary">' + q.difficulty + '</span></td><td><span class="badge badge-' + statusClass + '">' + q.status + '</span></td><td>' + (q.question_count||'?') + '</td><td style="font-size:0.75rem;color:var(--neutral-400)">' + (q.created_date||'').slice(0,10) + '</td><td>' + actions + '</td></tr>';
            });
            h += '</tbody></table></div>';
            c.innerHTML = h;
        }

        function deleteQuiz(id) {
            if (!confirm('Are you sure you want to delete this quiz? All questions, results, and access codes will also be removed.')) return;
            apiRequest('/api/admin/quiz/' + id + '/delete', 'DELETE').then(function(r) {
                if (r.success) { showAlert('Quiz deleted.', 'success'); loadQuizzes(); }
                else { showAlert(r.message, 'danger'); }
            });
        }

        async function generateAdminQuizReport(quizId) {
            console.log('[Report] Fetching admin report for quiz:', quizId);
            var result = await apiRequest('/api/admin/quiz/' + quizId + '/report');
            console.log('[Report] API result:', result);
            if (!result || !result.success) { showAlert('Error: ' + (result ? result.message : 'No response'), 'danger'); return; }

            var d = result.data;
            var quiz = d.quiz;
            var stats = d.stats;
            var results = d.results;
            var brandColor = '#4f46e5';
            var passColor = '#22c55e';
            var failColor = '#ef4444';

            var resultsHtml = results.length > 0 ? results.map(function(r, i) {
                var dateStr = r.date ? new Date(r.date).toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'}) : '-';
                var timeStr = Math.floor(r.time_taken/60) + 'm ' + (r.time_taken%60) + 's';
                var sColor = r.status === 'Pass' ? passColor : failColor;
                return '<tr><td style="padding:10px 12px;border-bottom:1px solid #e5e7eb;font-size:0.8rem;color:#374155">'+(i+1)+'</td><td style="padding:10px 12px;border-bottom:1px solid #e5e7eb;font-size:0.8rem;font-weight:600;color:#09090b">'+r.student_name+'</td><td style="padding:10px 12px;border-bottom:1px solid #e5e7eb;font-size:0.75rem;color:#71717a">'+(r.student_code||'-')+'</td><td style="padding:10px 12px;border-bottom:1px solid #e5e7eb;text-align:center">'+r.marks+'/'+r.total_questions+'</td><td style="padding:10px 12px;border-bottom:1px solid #e5e7eb;text-align:center;font-weight:600;color:'+brandColor+'">'+r.accuracy+'%</td><td style="padding:10px 12px;border-bottom:1px solid #e5e7eb;text-align:center">'+timeStr+'</td><td style="padding:10px 12px;border-bottom:1px solid #e5e7eb;text-align:center"><span style="display:inline-block;padding:3px 10px;border-radius:999px;font-size:0.7rem;font-weight:600;color:#fff;background:'+sColor+'">'+r.status+'</span></td><td style="padding:10px 12px;border-bottom:1px solid #e5e7eb;font-size:0.75rem;color:#a1a1aa">'+dateStr+'</td></tr>';
            }).join('') : '<tr><td colspan="8" style="text-align:center;padding:40px;color:#a1a1aa;font-size:0.85rem">No attempts yet.</td></tr>';

            var genDate = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
            var reportHtml = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Quiz Report - '+quiz.topic+'</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Inter,-apple-system,sans-serif;background:#f8fafc;color:#18181b}.report{max-width:900px;margin:40px auto;background:#fff;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.04)}.report-header{background:linear-gradient(135deg,'+brandColor+',#3730a3);padding:40px 48px;color:#fff;position:relative;overflow:hidden}.report-header::before{content:"";position:absolute;top:-50px;right:-50px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.08)}.report-logo{font-size:1.1rem;font-weight:700;margin-bottom:20px;position:relative;z-index:1}.report-logo span{opacity:.7}.report-title{font-size:1.8rem;font-weight:800;letter-spacing:-.03em;margin-bottom:6px;position:relative;z-index:1}.report-subtitle{font-size:0.85rem;opacity:.8;position:relative;z-index:1}.report-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:28px 48px;background:#fafafa;border-bottom:1px solid #e5e7eb}.meta-item{text-align:center}.meta-value{font-size:1.5rem;font-weight:700;color:'+brandColor+';letter-spacing:-.02em}.meta-label{font-size:0.65rem;color:#a1a1aa;font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}.report-section{padding:28px 48px}.section-title{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#a1a1aa;margin-bottom:16px}.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.info-item{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#f8fafc;border-radius:10px;border:1px solid #f0f0f0}.info-icon{width:32px;height:32px;border-radius:8px;background:'+brandColor+';display:flex;align-items:center;justify-content:center;flex-shrink:0}.info-icon svg{width:16px;height:16px;color:#fff}.info-text .lbl{font-size:0.6rem;color:#a1a1aa;font-weight:500;text-transform:uppercase}.info-text .val{font-size:0.85rem;font-weight:600;color:#09090b}.results-table{width:100%;border-collapse:collapse;margin-top:16px}.results-table th{padding:10px 12px;text-align:left;font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#a1a1aa;border-bottom:2px solid #e5e7eb;background:#fafafa}.report-footer{padding:24px 48px;border-top:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center}.footer-brand{font-size:0.75rem;color:#a1a1aa}.footer-brand strong{color:#09090b}.footer-date{font-size:0.7rem;color:#a1a1aa}.print-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:8px;border:none;cursor:pointer;font-size:0.8rem;font-weight:600;color:#fff;background:'+brandColor+';margin:20px 48px 30px}.print-btn:hover{background:#3730a3}@media print{.print-btn{display:none}.report{border:none;box-shadow:none;margin:0}}@media(max-width:900px){.report-meta,.info-grid{grid-template-columns:1fr 1fr}}</style></head><body><div class="report"><div class="report-header"><div class="report-logo">AI<span>Learn</span> Quiz Report</div><div class="report-title">'+quiz.topic+'</div><div class="report-subtitle">'+(quiz.subject||'General')+' · '+quiz.difficulty+' · '+stats.question_count+' Questions</div></div><div class="report-meta"><div class="meta-item"><div class="meta-value">'+stats.total_attempts+'</div><div class="meta-label">Attempts</div></div><div class="meta-item"><div class="meta-value" style="color:'+passColor+'">'+stats.passed+'</div><div class="meta-label">Passed</div></div><div class="meta-item"><div class="meta-value" style="color:'+failColor+'">'+stats.failed+'</div><div class="meta-label">Failed</div></div><div class="meta-item"><div class="meta-value">'+stats.pass_rate+'%</div><div class="meta-label">Pass Rate</div></div></div><div class="report-section"><div class="section-title">Quiz Details</div><div class="info-grid"><div class="info-item"><div class="info-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div class="info-text"><div class="lbl">Mentor</div><div class="val">'+d.mentor_name+'</div></div></div><div class="info-item"><div class="info-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div><div class="info-text"><div class="lbl">Access Code</div><div class="val" style="letter-spacing:.1em;font-family:monospace">'+d.unique_code+'</div></div></div><div class="info-item"><div class="info-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></div><div class="info-text"><div class="lbl">Topic</div><div class="val">'+quiz.topic+'</div></div></div><div class="info-item"><div class="info-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div><div class="info-text"><div class="lbl">Avg Accuracy</div><div class="val">'+stats.avg_accuracy+'%</div></div></div></div></div><div class="report-section" style="padding-top:0"><div class="section-title">Student Results</div><table class="results-table"><thead><tr><th>#</th><th>Student</th><th>Code</th><th style="text-align:center">Score</th><th style="text-align:center">Accuracy</th><th style="text-align:center">Time</th><th style="text-align:center">Status</th><th>Date</th></tr></thead><tbody>'+resultsHtml+'</tbody></table></div><div class="report-footer"><div class="footer-brand">Generated by <strong>AI Learn</strong></div><div class="footer-date">'+genDate+'</div></div></div><div style="text-align:center"><button class="print-btn" onclick="window.print()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Print / Save as PDF</button></div></body></html>';

            var w = window.open('','_blank','width=1000,height=800');
            if (w) { w.document.write(reportHtml); w.document.close(); }
            else { showAlert('Pop-up blocked. Allow pop-ups and try again.', 'warning'); }
        }

        loadQuizzes();
    </script>
</body>
</html>

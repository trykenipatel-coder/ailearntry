<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Materials - Admin - AI Learning System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .mat-table { width:100%; border-collapse:collapse }
        .mat-table th { background:var(--neutral-50); padding:10px 12px; font-size:0.7rem; text-transform:uppercase; letter-spacing:.05em; color:var(--neutral-400); text-align:left; font-weight:600 }
        .mat-table td { padding:10px 12px; font-size:0.82rem; border-bottom:1px solid var(--border-subtle) }
        .mat-table tr:hover td { background:var(--neutral-50) }
        body.dark .mat-table th { background:rgba(255,255,255,.03) }
        body.dark .mat-table tr:hover td { background:rgba(255,255,255,.02) }
    </style>
</head>
<body>
    <nav class="navbar" id="mainNav">
        <a href="../index.html" class="logo">AI<span>Learn</span></a>
        <ul class="nav-links" id="navLinks">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="manage-students.html">Students</a></li>
            <li><a href="manage-mentors.html">Mentors</a></li>
            <li><a href="materials.html" style="color:var(--brand-600);font-weight:600">Materials</a></li>
            <li><a href="quizzes.html">Quizzes</a></li>
        </ul>
    </nav>

    <main class="container dashboard">
        <div class="dashboard-header">
            <h1>All Study Materials</h1>
            <p>View all study materials uploaded by mentors. Full access to view, download, and delete.</p>
        </div>

        <div id="materials-container"><div class="loading"><div class="spinner"></div></div></div>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/admin.js"></script>
    <script>
        var allMaterials = [];

        async function loadMaterials() {
            var auth = await checkAuth();
            if (!auth || auth.role !== 'admin') return;
            var r = await apiRequest('/api/admin/materials');
            if (!r.success) return;
            allMaterials = r.data || [];
            renderMaterials(allMaterials);
        }

        function renderMaterials(list) {
            var c = document.getElementById('materials-container');
            if (!list.length) {
                c.innerHTML = '<div class="card" style="text-align:center;padding:60px 40px"><svg viewBox="0 0 24 24" fill="none" stroke="var(--neutral-300)" stroke-width="1.5" style="width:48px;height:48px;margin-bottom:12px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><h2>No Materials</h2><p style="color:var(--text-light);font-size:0.9rem">No study materials have been uploaded yet.</p></div>';
                return;
            }
            var h = '<div class="table-container"><table class="mat-table"><thead><tr><th>Title</th><th>Mentor</th><th>Type</th><th>Size</th><th>Subject</th><th>Course</th><th>Category</th><th>Views</th><th>Downloads</th><th>Status</th><th>Uploaded</th><th>Actions</th></tr></thead><tbody>';
            list.forEach(function(m) {
                var isLink = m.file_type === 'link';
                var icon = isLink ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;vertical-align:middle;margin-right:4px"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>' : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;vertical-align:middle;margin-right:4px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>';
                var ext = isLink ? (m.link_type||'LINK').toUpperCase() : (m.file_type||'').toUpperCase();
                var sizeText = m.file_size ? formatSize(m.file_size) : '-';
                h += '<tr><td><strong>' + icon + ' ' + m.title + '</strong></td><td>' + m.mentor_name + '</td><td>' + ext + '</td><td>' + sizeText + '</td><td>' + (m.subject||'-') + '</td><td>' + (m.course||'-') + '</td><td>' + (m.category||'-') + '</td><td>' + (m.total_views||0) + '</td><td>' + (m.total_downloads||0) + '</td><td><span class="badge badge-' + (m.status === 'active' ? 'success' : 'secondary') + '">' + m.status + '</span></td><td style="font-size:0.75rem;color:var(--neutral-400)">' + (m.created_date||'').slice(0,10) + '</td><td style="display:flex;gap:4px">';
                if (m.file_path && !isLink) {
                    h += '<a href="/api/uploads/' + m.file_path + '" target="_blank" class="btn btn-outline btn-sm" title="View"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></a>';
                    h += '<a href="/api/admin/materials/' + m.material_id + '/download" class="btn btn-outline btn-sm" title="Download"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></a>';
                }
                if (isLink && m.external_link) {
                    h += '<a href="' + m.external_link + '" target="_blank" class="btn btn-outline btn-sm" title="Open"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>';
                }
                h += '<button class="btn btn-danger btn-sm" onclick="deleteMaterial(' + m.material_id + ')" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>';
                h += '</td></tr>';
            });
            h += '</tbody></table></div>';
            c.innerHTML = h;
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
            return (bytes/1048576).toFixed(1) + ' MB';
        }

        function deleteMaterial(id) {
            if (!confirm('Are you sure you want to delete this study material? This action cannot be undone.')) return;
            apiRequest('/api/admin/materials/' + id + '/delete', 'DELETE').then(function(r) {
                if (r.success) { showAlert('Material deleted.', 'success'); loadMaterials(); }
                else { showAlert(r.message, 'danger'); }
            });
        }

        loadMaterials();
    </script>
</body>
</html>

{% extends "base.html" %}
{% block title %}My Results{% endblock %}

{% block content %}
<div class="dashboard-header">
    <h1>My Quiz Results</h1>
    <p>View your quiz history and performance.</p>
</div>

<div class="card">
    <div class="table-container">
        <table id="results-table">
            <thead>
                <tr>
                    <th>Topic</th>
                    <th>Score</th>
                    <th>Accuracy</th>
                    <th>Difficulty</th>
                    <th>Status</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="6" style="text-align:center">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/student.js"></script>
<script>loadResults();</script>
{% endblock %}

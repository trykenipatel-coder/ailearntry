{% extends "base.html" %}
{% block title %}Manage Mentors{% endblock %}

{% block content %}
<div class="dashboard-header">
    <h1>Manage Mentors</h1>
    <p>View and manage all registered mentors.</p>
</div>

<div class="card">
    <div class="table-container">
        <table id="mentors-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Subject</th>
                    <th>Quizzes Created</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="5" style="text-align:center">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/admin.js"></script>
<script>loadMentors();</script>
{% endblock %}
